version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://postgres:postgres@host.docker.internal:32768/rest_express
      - JWT_SECRET=your-secret-key
    extra_hosts:
      - "host.docker.internal:host-gateway"